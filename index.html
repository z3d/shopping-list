<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<meta name="app-version" content="2.2.0">
<title>Shopping List</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --surface: rgba(255,255,255,0.05);
  --surface-hover: rgba(255,255,255,0.08);
  --text: #e4e4e4;
  --text-dim: #888;
  --accent: #4ade80;
  --accent-hover: #22c55e;
  --accent-dim: rgba(74, 222, 128, 0.15);
  --danger: #f87171;
  --danger-hover: #ef4444;
  --warning: #fbbf24;
  --blue: #60a5fa;
  --border: rgba(255,255,255,0.1);
  --radius: 12px;
}

html, body {
  height: 100%;
  background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.app { max-width: 700px; margin: 0 auto; padding: 16px; min-height: 100%; }

/* Header */
.header {
  position: sticky; top: 0; z-index: 10;
  background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
  padding: 12px 0 8px; margin-bottom: 8px;
}
.header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.header h1 { font-size: 20px; font-weight: 600; flex: 1; }

/* Role badge */
.role-badge {
  font-size: 11px; padding: 3px 10px; border-radius: 10px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  cursor: pointer; border: none; -webkit-tap-highlight-color: transparent;
}
.role-badge.maker { background: rgba(96,165,250,0.2); color: var(--blue); }
.role-badge.shopper { background: var(--accent-dim); color: var(--accent); }

/* Icon buttons */
.icon-btn {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: var(--surface); color: var(--text); font-size: 20px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:hover { background: var(--surface-hover); }

/* Section label */
.section-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-dim); padding: 16px 12px 4px; font-weight: 600;
}

/* List rows */
.list-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 12px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.15s;
}
.list-row:hover { background: var(--surface-hover); }
.list-row:active { background: rgba(255,255,255,0.12); }
.list-name { flex: 1; font-size: 16px; font-weight: 500; }
.list-meta { color: var(--text-dim); font-size: 13px; white-space: nowrap; }
.list-badge {
  font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500;
}
.list-badge.template { background: rgba(96,165,250,0.15); color: var(--blue); }
.list-badge.done { background: var(--accent-dim); color: var(--accent); }
.list-badge.partial { background: rgba(251,191,36,0.15); color: var(--warning); }
.list-badge.empty { background: var(--surface); color: var(--text-dim); }

/* Item rows — swipe wrapper */
.item-wrap {
  position: relative; overflow: hidden;
  border-bottom: 1px solid var(--border);
}
.item-delete-bg {
  position: absolute; right: 0; top: 0; bottom: 0; width: 80px;
  background: var(--danger); display: none; align-items: center;
  justify-content: center; color: white; font-size: 14px; font-weight: 600;
}
.item-wrap.swiped .item-delete-bg { display: flex; }
.item-row {
  position: relative; display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
  transition: transform 0.2s ease, opacity 0.3s;
  will-change: transform;
}
.item-row.swiping { transition: none; }
.item-row.checked { opacity: 0.5; }
.item-row.unselected { opacity: 0.4; }
.item-check {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--border); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s; color: transparent;
  -webkit-tap-highlight-color: transparent; font-size: 14px;
}
.item-check:hover { border-color: var(--accent); }
.item-check.checked { background: var(--accent); border-color: var(--accent); color: #111; }
.item-check.selected { background: var(--blue); border-color: var(--blue); color: #fff; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 15px; font-weight: 500; }
.item-name.checked { text-decoration: line-through; color: var(--text-dim); }
.item-detail { font-size: 13px; color: var(--text-dim); }

/* Inline qty input */
.item-qty-inline {
  width: 48px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-size: 14px;
  font-weight: 600; text-align: center; outline: none;
  -webkit-appearance: none; -moz-appearance: textfield;
}
.item-qty-inline:focus { border-color: var(--blue); }
.item-qty-inline::-webkit-inner-spin-button { -webkit-appearance: none; }

/* Qty badge (for shop lists / shopper view) */
.item-qty-badge {
  min-width: 28px; height: 28px; border-radius: 8px;
  background: var(--surface); color: var(--text);
  font-size: 14px; font-weight: 600; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  padding: 0 6px;
}
.item-qty-badge.multi { background: rgba(96,165,250,0.2); color: var(--blue); }

.item-category {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: var(--surface); color: var(--text-dim); white-space: nowrap;
}
.item-actions { display: flex; gap: 4px; }
.item-action-btn {
  width: 32px; height: 32px; border-radius: 50%; border: none;
  background: transparent; color: var(--text-dim); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.item-action-btn:hover { background: var(--surface); color: var(--text); }

/* Category headers */
.category-header {
  font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--accent); padding: 16px 12px 6px; font-weight: 600;
}

/* Detail header */
.detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.detail-header h2 { flex: 1; font-size: 22px; font-weight: 600; }
.back-btn {
  background: none; border: none; color: var(--accent);
  font-size: 15px; cursor: pointer; padding: 8px 12px 8px 0;
  display: flex; align-items: center; gap: 4px;
  -webkit-tap-highlight-color: transparent;
}

/* Quick add bar */
.quick-add { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.quick-add input, .quick-add select {
  padding: 10px 12px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 14px; outline: none; -webkit-appearance: none;
}
.quick-add input:focus, .quick-add select:focus { border-color: var(--accent); }
.quick-add input::placeholder { color: var(--text-dim); }
.add-item-btn {
  padding: 10px 16px; border-radius: var(--radius); border: none;
  background: var(--accent); color: #111; font-size: 15px;
  font-weight: 600; cursor: pointer; white-space: nowrap;
}
.add-item-btn:hover { background: var(--accent-hover); }

/* Summary bar */
.summary-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; margin-bottom: 8px;
  background: var(--surface); border-radius: var(--radius);
  font-size: 14px; color: var(--text-dim);
}
.summary-bar .count { font-weight: 600; color: var(--text); }
.summary-bar .progress-bar {
  flex: 1; height: 6px; background: var(--surface-hover);
  border-radius: 3px; overflow: hidden;
}
.summary-bar .progress-fill {
  height: 100%; background: var(--accent); border-radius: 3px;
  transition: width 0.3s ease;
}

/* Create shop button */
.create-shop-btn {
  position: sticky; bottom: 16px; width: 100%; padding: 14px;
  border-radius: var(--radius); border: none;
  background: var(--accent); color: #111; font-size: 16px;
  font-weight: 700; cursor: pointer; margin-top: 16px;
  box-shadow: 0 4px 20px rgba(74,222,128,0.3);
}
.create-shop-btn:hover { background: var(--accent-hover); }
.create-shop-btn:disabled { opacity: 0.4; cursor: default; }

/* Empty state */
.empty-state { text-align: center; color: var(--text-dim); padding: 60px 20px; font-size: 15px; }

/* Forms */
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: 13px; color: var(--text-dim);
  margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px;
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 10px 12px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 15px; font-family: inherit;
  outline: none; -webkit-appearance: none;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
.form-group select { cursor: pointer; }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.submit-btn {
  width: 100%; padding: 12px; border-radius: var(--radius); border: none;
  background: var(--accent); color: #111; font-size: 16px;
  font-weight: 600; cursor: pointer; margin-top: 8px;
}
.submit-btn:hover { background: var(--accent-hover); }

/* Settings overlay */
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 100; align-items: flex-end; justify-content: center;
}
.overlay.active { display: flex; }
.panel {
  background: var(--bg2); border-radius: 16px 16px 0 0;
  padding: 24px; width: 100%; max-width: 700px; max-height: 80vh; overflow-y: auto;
}
.panel h2 { margin-bottom: 16px; font-size: 18px; }
.panel-actions { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
.panel-actions button {
  flex: 1; min-width: 120px; padding: 10px; border-radius: var(--radius);
  border: none; font-size: 14px; cursor: pointer; font-weight: 500;
}
.btn-primary { background: var(--accent); color: #111; }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border) !important; }
.btn-danger { background: var(--danger); color: white; }

/* Scan banner */
.scan-banner {
  display: none; position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
  background: var(--bg2); border: 1px solid var(--accent); border-radius: var(--radius);
  padding: 10px 16px; z-index: 200; align-items: center; gap: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4); max-width: 90%; min-width: 200px;
}
.scan-banner.active { display: flex; }
.scan-spinner {
  width: 18px; height: 18px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.scan-banner-text { color: var(--text); font-size: 14px; }

/* Scan results */
.scan-match {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-bottom: 1px solid var(--border);
}
.scan-match-icon { font-size: 18px; flex-shrink: 0; }
.scan-match-info { flex: 1; }
.scan-match-name { font-size: 14px; font-weight: 500; }
.scan-match-detail { font-size: 12px; color: var(--text-dim); }
.scan-unmatched { color: var(--text-dim); font-size: 13px; padding: 8px 12px; }

/* Toast */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #333; color: white; padding: 10px 20px; border-radius: var(--radius);
  font-size: 14px; z-index: 300; opacity: 0; transition: opacity 0.3s;
  pointer-events: none; max-width: 90%; text-align: center;
}
.toast.show { opacity: 1; }

.loading { text-align: center; padding: 40px; color: var(--text-dim); }
.file-input { display: none; }
.view { display: none; }
.view.active { display: block; }

@supports (padding: env(safe-area-inset-top)) {
  .header { padding-top: calc(12px + env(safe-area-inset-top)); }
  .app { padding-left: calc(16px + env(safe-area-inset-left)); padding-right: calc(16px + env(safe-area-inset-right)); }
  .toast { bottom: calc(20px + env(safe-area-inset-bottom)); }
  .create-shop-btn { bottom: calc(16px + env(safe-area-inset-bottom)); }
}

@media (max-width: 480px) {
  .app { padding: 10px; }
  .header h1 { font-size: 18px; }
  .form-row { flex-direction: column; gap: 0; }
  .list-row { padding: 16px 10px; }
  .panel { padding: 20px 16px; }
  .panel-actions button { min-width: 100px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- LISTS VIEW -->
  <div id="listsView" class="view active">
    <div class="header">
      <div class="header-top">
        <h1>Shopping Lists</h1>
        <button class="role-badge maker" id="roleBadge" title="Switch role"></button>
        <button class="icon-btn" id="addListBtn" title="New list">+</button>
        <button class="icon-btn" id="settingsBtn" title="Settings">&#9881;</button>
      </div>
    </div>
    <ul id="listsList" style="list-style:none"></ul>
    <div class="empty-state" id="listsEmpty" style="display:none">
      No shopping lists yet. Tap + to create one.
    </div>
    <div class="loading" id="listsLoading">Loading...</div>
  </div>

  <!-- LIST DETAIL VIEW (templates + shop lists) -->
  <div id="listDetailView" class="view">
    <div class="header">
      <div class="detail-header">
        <button class="back-btn" id="backToListsBtn">&#8592; Back</button>
        <h2 id="listTitle"></h2>
        <button class="icon-btn" id="scanReceiptBtn" title="Scan receipt" style="display:none">&#128247;</button>
        <button class="icon-btn" id="editListBtn" title="Edit list">&#9998;</button>
      </div>
    </div>

    <div class="summary-bar" id="summaryBar">
      <span><span class="count" id="checkedCount">0</span> / <span class="count" id="totalCount">0</span></span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <div class="quick-add" id="quickAddBar">
      <input type="number" id="quickAddQty" placeholder="Qty" value="1" min="1" style="width:60px;flex:none;text-align:center">
      <input type="text" id="quickAddInput" placeholder="Add item..." style="flex:1;min-width:120px">
      <select id="quickAddCategory" style="flex:none">
        <option value="">No category</option>
        <option value="Fruit & Veg">Fruit & Veg</option>
        <option value="Meat & Seafood">Meat & Seafood</option>
        <option value="Dairy & Eggs">Dairy & Eggs</option>
        <option value="Bakery">Bakery</option>
        <option value="Pantry">Pantry</option>
        <option value="Frozen">Frozen</option>
        <option value="Drinks">Drinks</option>
        <option value="Snacks">Snacks</option>
        <option value="Household">Household</option>
        <option value="Health & Beauty">Health & Beauty</option>
        <option value="Other">Other</option>
      </select>
      <button class="add-item-btn" id="quickAddBtn">Add</button>
    </div>

    <div id="itemsContainer"></div>
    <div class="empty-state" id="itemsEmpty" style="display:none">No items yet.</div>

    <button class="create-shop-btn" id="createShopBtn" style="display:none">Create Shopping List</button>
  </div>

  <!-- ADD/EDIT LIST FORM -->
  <div id="listFormView" class="view">
    <div class="detail-header">
      <button class="back-btn" id="cancelListFormBtn">&#8592; Cancel</button>
      <h2 id="listFormTitle">New List</h2>
    </div>
    <div class="form-group">
      <label>List Name</label>
      <input type="text" id="listNameInput" placeholder="e.g. Weekly Groceries">
    </div>
    <div class="form-group" id="templateCheckGroup">
      <label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:15px;color:var(--text);cursor:pointer">
        <input type="checkbox" id="listTemplateCheck" style="width:20px;height:20px"> This is a template (master item list)
      </label>
    </div>
    <button class="submit-btn" id="saveListBtn">Save List</button>
    <button class="btn-danger" id="deleteListBtn" style="width:100%;padding:12px;border-radius:var(--radius);border:none;font-size:14px;cursor:pointer;margin-top:12px;display:none">Delete List</button>
  </div>

  <!-- ADD/EDIT ITEM FORM -->
  <div id="itemFormView" class="view">
    <div class="detail-header">
      <button class="back-btn" id="cancelItemFormBtn">&#8592; Cancel</button>
      <h2 id="itemFormTitle">Add Item</h2>
    </div>
    <div class="form-group">
      <label>Item Name</label>
      <input type="text" id="itemNameInput" placeholder="e.g. Chicken breast">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Quantity</label>
        <input type="text" id="itemQtyInput" placeholder="e.g. 2">
      </div>
      <div class="form-group">
        <label>Unit</label>
        <input type="text" id="itemUnitInput" placeholder="e.g. kg, pack, L">
      </div>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="itemCategorySelect">
        <option value="">Uncategorised</option>
        <option value="Fruit & Veg">Fruit & Veg</option>
        <option value="Meat & Seafood">Meat & Seafood</option>
        <option value="Dairy & Eggs">Dairy & Eggs</option>
        <option value="Bakery">Bakery</option>
        <option value="Pantry">Pantry</option>
        <option value="Frozen">Frozen</option>
        <option value="Drinks">Drinks</option>
        <option value="Snacks">Snacks</option>
        <option value="Household">Household</option>
        <option value="Health & Beauty">Health & Beauty</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <input type="text" id="itemNotesInput" placeholder="e.g. Get the organic one">
    </div>
    <button class="submit-btn" id="saveItemBtn">Add Item</button>
    <button class="btn-danger" id="deleteItemBtn" style="width:100%;padding:12px;border-radius:var(--radius);border:none;font-size:14px;cursor:pointer;margin-top:12px;display:none">Delete Item</button>
  </div>

  <!-- SCAN RESULTS VIEW -->
  <div id="scanResultsView" class="view">
    <div class="detail-header">
      <button class="back-btn" id="closeScanResultsBtn">&#8592; Back</button>
      <h2>Receipt Scan</h2>
    </div>
    <div id="scanResultsContent"></div>
    <div class="panel-actions" style="margin-top:20px">
      <button class="btn-primary" id="applyScanBtn">Check Off Matched Items</button>
    </div>
  </div>

</div>

<!-- SETTINGS OVERLAY -->
<div class="overlay" id="settingsOverlay">
  <div class="panel">
    <h2>Settings</h2>
    <div class="form-group">
      <label>Worker URL</label>
      <input type="text" id="workerUrlInput" placeholder="https://shopping-list.example.workers.dev">
    </div>
    <div class="form-group">
      <label>Auth Token</label>
      <input type="password" id="tokenInput" placeholder="Dashboard token">
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="roleSelect">
        <option value="maker">List Maker (full access)</option>
        <option value="shopper">Shopper (check off only)</option>
      </select>
    </div>
    <div class="panel-actions">
      <button class="btn-primary" id="saveSettingsBtn">Save</button>
      <button class="btn-secondary" id="closeSettingsBtn">Cancel</button>
    </div>
  </div>
</div>

<!-- SCAN BANNER -->
<div class="scan-banner" id="scanBanner">
  <div class="scan-spinner"></div>
  <span class="scan-banner-text" id="scanBannerText">Scanning receipt...</span>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>
<input type="file" class="file-input" id="receiptFileInput" accept="image/*" multiple>

<script>
(function() {
  var config = { workerUrl: '', token: '', role: 'maker' };
  var STORAGE_KEY = 'shopping_list_config';
  var currentListId = null;
  var currentItems = [];
  var currentList = null;
  var editingItemId = null;
  var editingListId = null;
  var scanMatches = [];

  function loadConfig() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        config.workerUrl = parsed.workerUrl || '';
        config.token = parsed.token || '';
        config.role = parsed.role || 'maker';
      }
    } catch (e) {}
    if (!config.workerUrl && window.location.hostname.indexOf('.workers.dev') !== -1) {
      config.workerUrl = window.location.origin;
    }
  }

  function saveConfig() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(config)); } catch (e) {}
  }

  var el = {};
  function initElements() {
    el.listsView = document.getElementById('listsView');
    el.listDetailView = document.getElementById('listDetailView');
    el.listFormView = document.getElementById('listFormView');
    el.itemFormView = document.getElementById('itemFormView');
    el.scanResultsView = document.getElementById('scanResultsView');

    el.roleBadge = document.getElementById('roleBadge');
    el.addListBtn = document.getElementById('addListBtn');
    el.settingsBtn = document.getElementById('settingsBtn');
    el.listsList = document.getElementById('listsList');
    el.listsEmpty = document.getElementById('listsEmpty');
    el.listsLoading = document.getElementById('listsLoading');

    el.backToListsBtn = document.getElementById('backToListsBtn');
    el.listTitle = document.getElementById('listTitle');
    el.scanReceiptBtn = document.getElementById('scanReceiptBtn');
    el.editListBtn = document.getElementById('editListBtn');
    el.summaryBar = document.getElementById('summaryBar');
    el.checkedCount = document.getElementById('checkedCount');
    el.totalCount = document.getElementById('totalCount');
    el.progressFill = document.getElementById('progressFill');
    el.quickAddBar = document.getElementById('quickAddBar');
    el.quickAddQty = document.getElementById('quickAddQty');
    el.quickAddInput = document.getElementById('quickAddInput');

  function showView(v) {
    var views = document.querySelectorAll('.view');
    for (var i = 0; i < views.length; i++) views[i].classList.remove('active');
    v.classList.add('active');
  }

  var toastTimer = null;
  function toast(msg) {
    el.toast.textContent = msg;
    el.toast.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { el.toast.classList.remove('show'); }, 3000);
  }

  function api(method, path, body, cb) {
    if (!config.workerUrl) { toast('Set Worker URL in settings first'); return; }
    var xhr = new XMLHttpRequest();
    xhr.open(method, config.workerUrl + path);
    xhr.setRequestHeader('Content-Type', 'application/json');
    if (config.token) xhr.setRequestHeader('X-Dashboard-Token', config.token);
    xhr.onload = function() {
      try {
        var data = JSON.parse(xhr.responseText);
        if (xhr.status >= 200 && xhr.status < 300) cb(null, data);
        else cb(data.error || 'Request failed');
      } catch (e) { cb('Invalid response'); }
    };
    xhr.onerror = function() { cb('Network error'); };
    xhr.send(body ? JSON.stringify(body) : null);
  }

  function isMaker() { return config.role === 'maker'; }
  function isTemplate() { return currentList && currentList.is_template; }

  function updateRoleBadge() {
    el.roleBadge.textContent = isMaker() ? 'MAKER' : 'SHOPPER';
    el.roleBadge.className = 'role-badge ' + config.role;
  }

  function updateRoleUI() {
    updateRoleBadge();
    el.addListBtn.style.display = isMaker() ? '' : 'none';
  }

  function updateDetailUI() {
    var tpl = isTemplate();
    // Maker sees: add bar + edit on templates; scan + edit on shop lists
    // Shopper sees: scan on shop lists only
    el.quickAddBar.style.display = isMaker() ? '' : 'none';
    el.editListBtn.style.display = isMaker() ? '' : 'none';
    el.scanReceiptBtn.style.display = (!tpl) ? '' : 'none';
    el.createShopBtn.style.display = (isMaker() && tpl) ? '' : 'none';
    // Summary bar: templates show selected count, shop lists show checked count
    el.summaryBar.style.display = '';
  }

  /* ── Lists View ── */
  function fetchLists() {
    el.listsLoading.style.display = 'block';
    el.listsEmpty.style.display = 'none';
    el.listsList.innerHTML = '';
    api('GET', '/api/lists', null, function(err, data) {
      el.listsLoading.style.display = 'none';
      if (err) { toast('Error: ' + err); return; }
      var lists = data.lists || [];
      // Shopper only sees non-template lists
      if (!isMaker()) {
        var filtered = [];
        for (var i = 0; i < lists.length; i++) {
          if (!lists[i].is_template) filtered.push(lists[i]);
        }
        lists = filtered;
      }
      if (lists.length === 0) {
        el.listsEmpty.style.display = 'block';
        el.listsEmpty.textContent = isMaker() ? 'No lists yet. Tap + to create one.' : 'No shopping lists yet.';
        return;
      }
      renderLists(lists);
    });
  }

  function renderLists(lists) {
    el.listsList.innerHTML = '';
    var lastWasTemplate = null;

    for (var i = 0; i < lists.length; i++) {
      var li = lists[i];

      // Section headers for maker
      if (isMaker() && li.is_template !== lastWasTemplate) {
        var label = document.createElement('div');
        label.className = 'section-label';
        label.textContent = li.is_template ? 'Templates' : 'Shopping Lists';
        el.listsList.appendChild(label);
        lastWasTemplate = li.is_template;
      }

      var row = document.createElement('li');
      row.className = 'list-row';
      row.setAttribute('data-id', li.id);

      var total = li.item_count || 0;
      var badgeHtml = '';
      if (li.is_template) {
        var sel = li.selected_count || 0;
        badgeHtml = '<span class="list-badge template">' + sel + ' selected</span>';
      } else {
        var checked = li.checked_count || 0;
        var cls = total === 0 ? 'empty' : (checked === total ? 'done' : 'partial');
        var txt = total === 0 ? 'Empty' : checked + '/' + total;
        badgeHtml = '<span class="list-badge ' + cls + '">' + txt + '</span>';
      }

      row.innerHTML = '<div class="list-name">' + escHtml(li.name) + '</div>' +
        badgeHtml + '<span class="list-meta">&#9656;</span>';

      (function(id) {
        row.addEventListener('click', function() { openList(id); });
      })(li.id);

      // Wrap non-template lists in swipe container for maker delete
      if (isMaker() && !li.is_template) {
        var wrap = document.createElement('li');
        wrap.className = 'item-wrap';
        wrap.setAttribute('data-list-id', li.id);
        wrap.innerHTML = '<div class="item-delete-bg">Delete</div>';
        wrap.appendChild(row);
        el.listsList.appendChild(wrap);
      } else {
        el.listsList.appendChild(row);
      }
    }
  }

  /* ── List Detail ── */
  function openList(id) {
    currentListId = id;
    showView(el.listDetailView);
    el.listTitle.textContent = 'Loading...';
    el.itemsContainer.innerHTML = '';
    el.itemsEmpty.style.display = 'none';

    api('GET', '/api/lists/' + id, null, function(err, data) {
      if (err) { toast('Error: ' + err); showView(el.listsView); return; }
      currentList = data.list;
      currentItems = data.items || [];
      el.listTitle.textContent = currentList.name;
      updateDetailUI();
      renderItems();
    });
  }

  function renderItems() {
    el.itemsContainer.innerHTML = '';
    if (currentItems.length === 0) {
      el.itemsEmpty.style.display = 'block';
      updateSummary();
      return;
    }
    el.itemsEmpty.style.display = 'none';

    // Group by category
    var categories = {};
    var uncategorised = [];
    for (var i = 0; i < currentItems.length; i++) {
      var item = currentItems[i];
      var cat = item.category || '';
      if (!cat) uncategorised.push(item);
      else {
        if (!categories[cat]) categories[cat] = [];
        categories[cat].push(item);
      }
    }

    var catKeys = [];
    for (var k in categories) {
      if (categories.hasOwnProperty(k)) catKeys.push(k);
    }
    catKeys.sort();

    if (uncategorised.length > 0) renderItemGroup('', uncategorised);
    for (var c = 0; c < catKeys.length; c++) {
      renderItemGroup(catKeys[c], categories[catKeys[c]]);
    }

    updateSummary();
  }

  function renderItemGroup(category, items) {
    if (category) {
      var header = document.createElement('div');
      header.className = 'category-header';
      header.textContent = category;
      el.itemsContainer.appendChild(header);
    }

    var tpl = isTemplate();

    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      var row = document.createElement('div');
      row.setAttribute('data-id', item.id);

      if (tpl) {
        // TEMPLATE VIEW: select toggle + inline qty
        var sel = item.selected ? true : false;
        row.className = 'item-row' + (sel ? '' : ' unselected');

        var actionsHtml = '';
        if (isMaker()) {
          actionsHtml = '<div class="item-actions">' +
            '<button class="item-action-btn edit-item-btn" data-id="' + item.id + '" title="Edit">&#9998;</button>' +
            '</div>';
        }

        row.innerHTML =
          '<button class="item-check' + (sel ? ' selected' : '') + '" data-id="' + item.id + '">&#10003;</button>' +
          '<input type="number" class="item-qty-inline" data-id="' + item.id + '" value="' + escHtml(item.quantity || '1') + '" min="1"' + (isMaker() ? '' : ' disabled') + '>' +
          '<div class="item-info">' +
            '<div class="item-name">' + escHtml(item.name) + '</div>' +
            (item.notes ? '<div class="item-detail">' + escHtml(item.notes) + '</div>' : '') +
          '</div>' +
          actionsHtml;
      } else {
        // SHOP LIST VIEW: check toggle + qty badge (read-only)
        var checked = item.checked ? true : false;
        row.className = 'item-row' + (checked ? ' checked' : '');

        var qty = item.quantity || '1';
        var isMulti = parseInt(qty) > 1;
        var qtyLabel = qty + (item.unit ? ' ' + item.unit : '');

        var actionsHtml2 = '';
        if (isMaker()) {
          actionsHtml2 = '<div class="item-actions">' +
            '<button class="item-action-btn edit-item-btn" data-id="' + item.id + '" title="Edit">&#9998;</button>' +
            '</div>';
        }

        row.innerHTML =
          '<button class="item-check' + (checked ? ' checked' : '') + '" data-id="' + item.id + '">&#10003;</button>' +
          '<span class="item-qty-badge' + (isMulti ? ' multi' : '') + '">' + escHtml(qtyLabel) + '</span>' +
          '<div class="item-info">' +
            '<div class="item-name' + (checked ? ' checked' : '') + '">' + escHtml(item.name) + '</div>' +
            (item.notes ? '<div class="item-detail">' + escHtml(item.notes) + '</div>' : '') +
          '</div>' +
          actionsHtml2;
      }

      // Wrap in swipe container for maker
      if (isMaker()) {
        var wrap = document.createElement('div');
        wrap.className = 'item-wrap';
        wrap.setAttribute('data-id', item.id);
        wrap.innerHTML = '<div class="item-delete-bg">Delete</div>';
        wrap.appendChild(row);
        el.itemsContainer.appendChild(wrap);
      } else {
        el.itemsContainer.appendChild(row);
      }
    }
  }

  function updateSummary() {
    var total = currentItems.length;
    if (isTemplate()) {
      var sel = 0;
      for (var i = 0; i < currentItems.length; i++) {
        if (currentItems[i].selected) sel++;
      }
      el.checkedCount.textContent = sel;
      el.totalCount.textContent = total;
      var pct = total > 0 ? Math.round((sel / total) * 100) : 0;
      el.progressFill.style.width = pct + '%';
      el.createShopBtn.textContent = 'Create Shopping List (' + sel + ' items)';
      el.createShopBtn.disabled = sel === 0;
    } else {
      var chk = 0;
      for (var j = 0; j < currentItems.length; j++) {
        if (currentItems[j].checked) chk++;
      }
      el.checkedCount.textContent = chk;
      el.totalCount.textContent = total;
      var pct2 = total > 0 ? Math.round((chk / total) * 100) : 0;
      el.progressFill.style.width = pct2 + '%';
    }
  }

  /* ── Toggle Select (template) ── */
  function toggleSelect(itemId) {
    var item = null;
    for (var i = 0; i < currentItems.length; i++) {
      if (currentItems[i].id === itemId) { item = currentItems[i]; break; }
    }
    if (!item) return;
    var newSel = item.selected ? 0 : 1;
    api('PUT', '/api/lists/' + currentListId + '/items/' + itemId, {
      selected: newSel
    }, function(err) {
      if (err) { toast('Error: ' + err); return; }
      item.selected = newSel;
      renderItems();
    });
  }

  /* ── Inline Qty Change (template) ── */
  function updateItemQty(itemId, qty) {
    api('PUT', '/api/lists/' + currentListId + '/items/' + itemId, {
      quantity: qty
    }, function(err) {
      if (err) { toast('Error: ' + err); return; }
      for (var i = 0; i < currentItems.length; i++) {
        if (currentItems[i].id === itemId) { currentItems[i].quantity = qty; break; }
      }
    });
  }

  /* ── Toggle Check (shop list) ── */
  function toggleCheck(itemId) {
    var item = null;
    for (var i = 0; i < currentItems.length; i++) {
      if (currentItems[i].id === itemId) { item = currentItems[i]; break; }
    }
    if (!item) return;
    var newChecked = item.checked ? 0 : 1;
    api('PUT', '/api/lists/' + currentListId + '/items/' + itemId, {
      checked: newChecked, checked_by: config.role
    }, function(err) {
      if (err) { toast('Error: ' + err); return; }
      item.checked = newChecked;
      renderItems();
    });
  }

  /* ── Create Shopping List from Template ── */
  function createShopList() {
    api('POST', '/api/lists/' + currentListId + '/create-shop', {}, function(err, data) {
      if (err) { toast('Error: ' + err); return; }
      toast('Shopping list created: ' + data.name);
      openList(data.id);
    });
  }

  /* ── Quick Add ── */
  function quickAddItem() {
    var name = el.quickAddInput.value.trim();
    if (!name) return;
    var qty = el.quickAddQty.value || '1';
    var cat = el.quickAddCategory.value || '';
    var item = { name: name, quantity: qty, unit: '', category: cat, notes: '' };

    api('POST', '/api/lists/' + currentListId + '/items', item, function(err, data) {
      if (err) { toast('Error: ' + err); return; }
      el.quickAddInput.value = '';
      el.quickAddQty.value = '1';
      currentItems.push(data);
      renderItems();
      el.quickAddInput.focus();
    });
  }

  /* ── List CRUD ── */
  function openListForm(listId) {
    editingListId = listId || null;
    el.listFormTitle.textContent = editingListId ? 'Edit List' : 'New List';
    el.listNameInput.value = '';
    el.listTemplateCheck.checked = false;
    el.deleteListBtn.style.display = editingListId ? 'block' : 'none';
    el.saveListBtn.textContent = editingListId ? 'Update List' : 'Create List';
    el.templateCheckGroup.style.display = editingListId ? 'none' : '';

    if (editingListId && currentList) {
      el.listNameInput.value = currentList.name;
    }
    showView(el.listFormView);
    el.listNameInput.focus();
  }

  function saveList() {
    var name = el.listNameInput.value.trim();
    if (!name) { toast('Enter a list name'); return; }

    if (editingListId) {
      api('PUT', '/api/lists/' + editingListId, { name: name }, function(err) {
        if (err) { toast('Error: ' + err); return; }
        toast('List updated');
        currentList.name = name;
        openList(editingListId);
      });
    } else {
      var body = { name: name, is_template: el.listTemplateCheck.checked };
      api('POST', '/api/lists', body, function(err, data) {
        if (err) { toast('Error: ' + err); return; }
        toast('List created');
        openList(data.id);
      });
    }
  }

  function deleteList() {
    if (!editingListId) return;
    if (!confirm('Delete this list and all its items?')) return;
    api('DELETE', '/api/lists/' + editingListId, null, function(err) {
      if (err) { toast('Error: ' + err); return; }
      toast('List deleted');
      showView(el.listsView);
      fetchLists();
    });
  }

  /* ── Item CRUD ── */
  function openItemForm(itemId) {
    editingItemId = itemId || null;
    el.itemFormTitle.textContent = editingItemId ? 'Edit Item' : 'Add Item';
    el.itemNameInput.value = '';
    el.itemQtyInput.value = '';
    el.itemUnitInput.value = '';
    el.itemCategorySelect.value = '';
    el.itemNotesInput.value = '';
    el.deleteItemBtn.style.display = editingItemId ? 'block' : 'none';
    el.saveItemBtn.textContent = editingItemId ? 'Update Item' : 'Add Item';

    if (editingItemId) {
      for (var i = 0; i < currentItems.length; i++) {
        if (currentItems[i].id === editingItemId) {
          var item = currentItems[i];
          el.itemNameInput.value = item.name;
          el.itemQtyInput.value = item.quantity || '';
          el.itemUnitInput.value = item.unit || '';
          el.itemCategorySelect.value = item.category || '';
          el.itemNotesInput.value = item.notes || '';
          break;
        }
      }
    }
    showView(el.itemFormView);
    el.itemNameInput.focus();
  }

  function saveItem() {
    var name = el.itemNameInput.value.trim();
    if (!name) { toast('Enter an item name'); return; }
    var body = {
      name: name, quantity: el.itemQtyInput.value.trim(),
      unit: el.itemUnitInput.value.trim(), category: el.itemCategorySelect.value,
      notes: el.itemNotesInput.value.trim()
    };

    if (editingItemId) {
      api('PUT', '/api/lists/' + currentListId + '/items/' + editingItemId, body, function(err) {
        if (err) { toast('Error: ' + err); return; }
        toast('Item updated');
        openList(currentListId);
      });
    } else {
      api('POST', '/api/lists/' + currentListId + '/items', body, function(err) {
        if (err) { toast('Error: ' + err); return; }
        toast('Item added');
        openList(currentListId);
      });
    }
  }

  function deleteItem() {
    if (!editingItemId) return;
    if (!confirm('Delete this item?')) return;
    api('DELETE', '/api/lists/' + currentListId + '/items/' + editingItemId, null, function(err) {
      if (err) { toast('Error: ' + err); return; }
      toast('Item deleted');
      openList(currentListId);
    });
  }

  /* ── Receipt Scanning ── */
  function startScan() { el.receiptFileInput.click(); }

  function handleReceiptFiles(files) {
    if (!files || files.length === 0) return;
    el.scanBanner.classList.add('active');
    el.scanBannerText.textContent = 'Scanning ' + files.length + ' receipt(s)...';

    var formData = new FormData();
    for (var i = 0; i < files.length; i++) formData.append('photos', files[i]);

    var itemNames = [];
    for (var j = 0; j < currentItems.length; j++) {
      itemNames.push({ id: currentItems[j].id, name: currentItems[j].name, quantity: currentItems[j].quantity, unit: currentItems[j].unit });
    }
    formData.append('list_items', JSON.stringify(itemNames));

    var xhr = new XMLHttpRequest();
    xhr.open('POST', config.workerUrl + '/api/scan-receipt');
    if (config.token) xhr.setRequestHeader('X-Dashboard-Token', config.token);
    xhr.onload = function() {
      el.scanBanner.classList.remove('active');
      try {
        var data = JSON.parse(xhr.responseText);
        if (xhr.status >= 200 && xhr.status < 300) showScanResults(data);
        else toast('Scan error: ' + (data.error || 'Unknown'));
      } catch (e) { toast('Invalid scan response'); }
    };
    xhr.onerror = function() { el.scanBanner.classList.remove('active'); toast('Scan network error'); };
    xhr.send(formData);
  }

  function showScanResults(data) {
    scanMatches = data.matches || [];
    var unmatched = data.unmatched || [];
    var html = '';
    if (scanMatches.length > 0) {
      html += '<div class="category-header">Matched Items</div>';
      for (var i = 0; i < scanMatches.length; i++) {
        var m = scanMatches[i];
        html += '<div class="scan-match"><span class="scan-match-icon" style="color:var(--accent)">&#10003;</span><div class="scan-match-info"><div class="scan-match-name">' + escHtml(m.list_item_name) + '</div><div class="scan-match-detail">Receipt: ' + escHtml(m.receipt_item) + (m.price ? ' &mdash; $' + m.price : '') + '</div></div></div>';
      }
    }
    if (unmatched.length > 0) {
      html += '<div class="category-header" style="color:var(--text-dim)">Not on List</div>';
      for (var u = 0; u < unmatched.length; u++) {
        html += '<div class="scan-unmatched">' + escHtml(unmatched[u].name) + (unmatched[u].price ? ' &mdash; $' + unmatched[u].price : '') + '</div>';
      }
    }
    if (!scanMatches.length && !unmatched.length) html = '<div class="empty-state">No items found on receipt.</div>';
    el.scanResultsContent.innerHTML = html;
    el.applyScanBtn.style.display = scanMatches.length > 0 ? '' : 'none';
    showView(el.scanResultsView);
  }

  function applyScanMatches() {
    if (scanMatches.length === 0) return;
    var remaining = scanMatches.length;
    var errors = 0;
    for (var i = 0; i < scanMatches.length; i++) {
      (function(match) {
        api('PUT', '/api/lists/' + currentListId + '/items/' + match.list_item_id, {
          checked: 1, checked_by: 'receipt_scan'
        }, function(err) {
          if (err) errors++;
          remaining--;
          if (remaining === 0) {
            toast((scanMatches.length - errors) + ' items checked off');
            openList(currentListId);
          }
        });
      })(scanMatches[i]);
    }
  }

  /* ── Settings ── */
  function openSettings() {
    el.workerUrlInput.value = config.workerUrl;
    el.tokenInput.value = config.token;
    el.roleSelect.value = config.role;
    el.settingsOverlay.classList.add('active');
  }

  function saveSettings() {
    config.workerUrl = el.workerUrlInput.value.trim().replace(/\/+$/, '');
    config.token = el.tokenInput.value.trim();
    config.role = el.roleSelect.value;
    saveConfig();
    el.settingsOverlay.classList.remove('active');
    updateRoleUI();
    toast('Settings saved');
    fetchLists();
  }

  function closeSettings() { el.settingsOverlay.classList.remove('active'); }

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  /* ── Events ── */
  function initEvents() {
    el.roleBadge.addEventListener('click', function() {
      config.role = isMaker() ? 'shopper' : 'maker';
      saveConfig();
      updateRoleUI();
      showView(el.listsView);
      fetchLists();
      toast('Switched to ' + config.role + ' mode');
    });

    el.addListBtn.addEventListener('click', function() { openListForm(null); });
    el.settingsBtn.addEventListener('click', openSettings);
    el.saveSettingsBtn.addEventListener('click', saveSettings);
    el.closeSettingsBtn.addEventListener('click', closeSettings);
    el.settingsOverlay.addEventListener('click', function(e) { if (e.target === el.settingsOverlay) closeSettings(); });

    el.backToListsBtn.addEventListener('click', function() { showView(el.listsView); fetchLists(); });
    el.editListBtn.addEventListener('click', function() { openListForm(currentListId); });
    el.scanReceiptBtn.addEventListener('click', startScan);
    el.receiptFileInput.addEventListener('change', function() { handleReceiptFiles(this.files); this.value = ''; });

    el.quickAddBtn.addEventListener('click', quickAddItem);
    el.quickAddInput.addEventListener('keydown', function(e) { if (e.key === 'Enter' || e.keyCode === 13) quickAddItem(); });

    el.createShopBtn.addEventListener('click', createShopList);

    el.cancelListFormBtn.addEventListener('click', function() {
      if (currentListId) openList(currentListId);
      else { showView(el.listsView); fetchLists(); }
    });
    el.saveListBtn.addEventListener('click', saveList);
    el.deleteListBtn.addEventListener('click', deleteList);

    el.cancelItemFormBtn.addEventListener('click', function() { openList(currentListId); });
    el.saveItemBtn.addEventListener('click', saveItem);
    el.deleteItemBtn.addEventListener('click', deleteItem);

    el.closeScanResultsBtn.addEventListener('click', function() { openList(currentListId); });
    el.applyScanBtn.addEventListener('click', applyScanMatches);

    // Event delegation for items
    var qtyTimer = null;
    el.itemsContainer.addEventListener('click', function(e) {
      var checkBtn = e.target.closest('.item-check');
      if (checkBtn) {
        var id = parseInt(checkBtn.getAttribute('data-id'));
        if (isTemplate()) toggleSelect(id);
        else toggleCheck(id);
        return;
      }
      var editBtn = e.target.closest('.edit-item-btn');
      if (editBtn) {
        openItemForm(parseInt(editBtn.getAttribute('data-id')));
        return;
      }
    });

    el.itemsContainer.addEventListener('change', function(e) {
      if (e.target.classList.contains('item-qty-inline')) {
        var id = parseInt(e.target.getAttribute('data-id'));
        var val = e.target.value || '1';
        updateItemQty(id, val);
      }
    });

    // Swipe-to-delete for maker (works on items and lists)
    var swipeState = { wrap: null, row: null, startX: 0, startY: 0, dx: 0, swiping: false };
    var SWIPE_THRESHOLD = 70;

    function initSwipe(container, onDelete) {
      container.addEventListener('touchstart', function(e) {
        if (!isMaker()) return;
        var wrap = e.target.closest('.item-wrap');
        if (!wrap) return;
        var row = wrap.querySelector('.item-row, .list-row');
        if (!row) return;
        var t = e.touches[0];
        swipeState.wrap = wrap;
        swipeState.row = row;
        swipeState.startX = t.clientX;
        swipeState.startY = t.clientY;
        swipeState.dx = 0;
        swipeState.swiping = false;
      }, { passive: true });

      container.addEventListener('touchmove', function(e) {
        if (!swipeState.row) return;
        var t = e.touches[0];
        var dx = t.clientX - swipeState.startX;
        var dy = t.clientY - swipeState.startY;
        if (!swipeState.swiping) {
          if (Math.abs(dy) > Math.abs(dx)) { swipeState.row = null; return; }
          if (dx < -10) swipeState.swiping = true;
          else return;
        }
        e.preventDefault();
        swipeState.dx = Math.min(0, dx);
        swipeState.row.classList.add('swiping');
        swipeState.row.style.transform = 'translateX(' + swipeState.dx + 'px)';
      }, { passive: false });

      container.addEventListener('touchend', function(e) {
        if (!swipeState.row) return;
        var row = swipeState.row;
        var wrap = swipeState.wrap;
        row.classList.remove('swiping');
        if (swipeState.dx < -SWIPE_THRESHOLD) {
          wrap.classList.add('swiped');
          row.style.transform = 'translateX(-80px)';
          var deleteBg = wrap.querySelector('.item-delete-bg');
          if (deleteBg) {
            deleteBg.onclick = function() { onDelete(wrap); };
          }
        } else {
          row.style.transform = '';
        }
        swipeState.row = null;
        swipeState.wrap = null;
      }, { passive: true });
    }

    // Items swipe delete
    initSwipe(el.itemsContainer, function(wrap) {
      var itemId = parseInt(wrap.getAttribute('data-id'));
      swipeDeleteItem(itemId, wrap);
    });

    // Lists swipe delete
    initSwipe(el.listsList, function(wrap) {
      var listId = parseInt(wrap.getAttribute('data-list-id'));
      swipeDeleteList(listId, wrap);
    });

    // Close any open swipe when tapping elsewhere
    document.addEventListener('touchstart', function(e) {
      if (!e.target.closest('.item-wrap')) {
        var open = document.querySelectorAll('.item-wrap.swiped');
        for (var i = 0; i < open.length; i++) {
          open[i].classList.remove('swiped');
          var r = open[i].querySelector('.item-row, .list-row');
          if (r) r.style.transform = '';
        }
      }
    }, { passive: true });
  }

  function swipeDeleteItem(itemId, wrapEl) {
    api('DELETE', '/api/lists/' + currentListId + '/items/' + itemId, null, function(err) {
      if (err) { toast('Error: ' + err); return; }
      // Animate out
      wrapEl.style.transition = 'height 0.2s, opacity 0.2s';
      wrapEl.style.height = wrapEl.offsetHeight + 'px';
      requestAnimationFrame(function() {
        wrapEl.style.height = '0';
        wrapEl.style.opacity = '0';
        wrapEl.style.overflow = 'hidden';
      });
      setTimeout(function() {
        // Remove from data
        for (var i = 0; i < currentItems.length; i++) {
          if (currentItems[i].id === itemId) { currentItems.splice(i, 1); break; }
        }
        renderItems();
        toast('Item deleted');
      }, 250);
    });
  }

  function swipeDeleteList(listId, wrapEl) {
    api('DELETE', '/api/lists/' + listId, null, function(err) {
      if (err) { toast('Error: ' + err); return; }
      wrapEl.style.transition = 'height 0.2s, opacity 0.2s';
      wrapEl.style.height = wrapEl.offsetHeight + 'px';
      requestAnimationFrame(function() {
        wrapEl.style.height = '0';
        wrapEl.style.opacity = '0';
        wrapEl.style.overflow = 'hidden';
      });
      setTimeout(function() {
        fetchLists();
        toast('List deleted');
      }, 250);
    });
  }

  function checkVersion() {
    var meta = document.querySelector('meta[name="app-version"]');
    if (!meta) return;
    var v = meta.getAttribute('content');
    var stored = localStorage.getItem('shopping_list_version');
    if (stored && stored !== v) { localStorage.setItem('shopping_list_version', v); window.location.reload(); return; }
    localStorage.setItem('shopping_list_version', v);
  }

  function init() {
    loadConfig();
    initElements();
    updateRoleUI();
    initEvents();
    checkVersion();
    if (config.workerUrl) fetchLists();
    else {
      el.listsLoading.style.display = 'none';
      el.listsEmpty.style.display = 'block';
      el.listsEmpty.textContent = 'Set your Worker URL in settings to get started.';
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
